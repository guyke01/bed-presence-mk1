packages:
  bed-presence-mk1: !include bed-presence-mk1.yaml

esphome:
  project:
    name: ElevatedSensors.BedPresenceMk1
    version: dev # This will be replace by the github workflows with the `release` version

# Allow ESPHome Adoption
dashboard_import:
  package_import_url: github://ElevatedSensors/sensor-configs/bed-presence-mk1.yaml@main
  import_full_config: true

# Allow provisioning Wi-Fi via serial
improv_serial:

# Sets up Bluetooth LE to allow the user
# to provision wifi credentials to the device.
esp32_improv:
  authorizer: none

# Managed updates from Elevated Sensors
ota:
  - platform: http_request
    id: ota_http_request

update:
  - platform: http_request
    id: update_http_request
    name: Firmware
    source: https://docs.elevatedsensors.com/firmware/bed-presence-mk1/latest/bed-presence-mk1.manifest.json
    update_interval: 25h

http_request:
  verify_ssl: true
